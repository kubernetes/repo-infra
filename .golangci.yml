run:
  timeout: 180s
  tests: true

linters-settings:
  dupl:
    threshold: 100
  gocyclo:
    min-complexity: 50

linters:
  enable:
  - govet
  - unused
  - revive
  - gocyclo
  disable-all: true

issues:
  exclude-dirs:
  - .git
  - .tool
  - vendor
  - verify
  exclude-rules:
  - linters:
    - revive
    text: ".*should not use dot dot imports"
